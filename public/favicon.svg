  <rect x="10" y="10" width="3" height="3" fill="none" stroke="white" stroke-width="0.5" />
  <rect x="19" y="10" width="3" height="3" fill="none" stroke="white" stroke-width="0.5" />
  <rect x="10" y="19" width="3" height="3" fill="none" stroke="white" stroke-width="0.5" />
</svg>